<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barita — Meet Your Advisor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --teal:#0BB8A9; --teal-light:#E8FAF8; --teal-dark:#089E90;
      --navy:#1A2342; --navy-light:#243060;
      --gold:#F59E0B; --gold-light:#FEF3C7;
      --green:#10B981; --green-light:#ECFDF5;
      --red:#EF4444;
      --bg:#F0F7F6;
      --surface:#FFFFFF;
      --border:#E2EEF0;
      --text:#1A2342;
      --muted:#5C7A82;
      --faint:#A8C4C8;
      --bear-bg:#FDF6EC;
      --radius:16px;
      --radius-sm:10px;
      --shadow:0 4px 20px rgba(11,184,169,0.10), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-md:0 8px 32px rgba(11,184,169,0.15), 0 2px 8px rgba(0,0,0,0.06);
    }

    html{scroll-behavior:smooth}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    /* ── BACKGROUND ── */
    .bg-pattern{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 40% at 10% 0%, rgba(11,184,169,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 90% 100%, rgba(245,158,11,0.06) 0%, transparent 60%);
    }

    .bg-dots{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:radial-gradient(circle, rgba(11,184,169,0.12) 1px, transparent 1px);
      background-size:28px 28px;
    }

    /* ── MAIN LAYOUT ── */
    .chat-wrap{
      position:relative;z-index:1;
      min-height:100vh;
      display:flex;flex-direction:column;
      max-width:720px;
      margin:0 auto;
      padding:0 16px 120px;
    }

    /* ── TOP BAR ── */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 0 12px;
      position:sticky;top:0;z-index:50;
      background:rgba(240,247,246,0.92);
      backdrop-filter:blur(12px);
    }

    .topbar-brand{display:flex;align-items:center;gap:10px}
    .topbar-bear{font-size:26px}
    .topbar-name{font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
    .topbar-name span{display:block;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}

    .progress-pill{
      display:flex;align-items:center;gap:8px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:20px;padding:6px 14px;
      font-size:12px;font-weight:700;color:var(--teal);
    }

    .progress-bar-mini{width:80px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
    .progress-bar-fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.4s ease}

    /* ── MESSAGES ── */
    .messages{
      display:flex;flex-direction:column;gap:16px;
      padding:20px 0 8px;
      flex:1;
    }

    /* Bear message */
    .msg-bear{
      display:flex;align-items:flex-start;gap:12px;
      animation:msgIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    .bear-avatar{
      width:46px;height:46px;border-radius:50%;
      background:var(--bear-bg);border:2px solid var(--gold-light);
      display:flex;align-items:center;justify-content:center;
      font-size:26px;flex-shrink:0;
      box-shadow:0 2px 8px rgba(245,158,11,0.2);
    }

    .bear-bubble{
      background:var(--surface);
      border:1.5px solid var(--border);
      border-radius:18px 18px 18px 4px;
      padding:14px 18px;
      max-width:82%;
      font-size:15px;line-height:1.65;color:var(--text);
      box-shadow:var(--shadow);
    }

    .bear-bubble strong{color:var(--teal)}
    .bear-bubble .emoji{font-size:18px}

    /* Typing indicator */
    .typing-indicator{display:flex;gap:4px;align-items:center;padding:4px 0}
    .typing-dot{
      width:7px;height:7px;background:var(--faint);border-radius:50%;
      animation:typeBounce 1.3s infinite ease-in-out;
    }
    .typing-dot:nth-child(2){animation-delay:0.2s}
    .typing-dot:nth-child(3){animation-delay:0.4s}

    /* User message */
    .msg-user{
      display:flex;justify-content:flex-end;
      animation:msgIn 0.3s ease both;
    }

    .user-bubble{
      background:var(--teal);
      color:white;
      border-radius:18px 18px 4px 18px;
      padding:12px 18px;
      max-width:72%;
      font-size:14px;line-height:1.6;
      box-shadow:0 4px 16px rgba(11,184,169,0.3);
    }

    /* ── OPTION BUTTONS ── */
    .options-tray{
      display:flex;flex-direction:column;gap:8px;
      margin-left:58px;margin-top:4px;
      animation:fadeUp 0.4s 0.1s ease both;
    }

    .option-btn{
      background:var(--surface);
      border:1.5px solid var(--border);
      border-radius:var(--radius-sm);
      padding:11px 18px;
      color:var(--text);font-family:'DM Sans',sans-serif;
      font-size:14px;font-weight:500;
      cursor:pointer;text-align:left;
      display:flex;align-items:center;gap:10px;
      transition:all 0.18s;
    }

    .option-btn:hover{
      border-color:var(--teal);
      background:var(--teal-light);
      color:var(--teal-dark);
      transform:translateX(4px);
    }

    .option-btn.selected{
      border-color:var(--teal);
      background:var(--teal-light);
      color:var(--teal-dark);
      font-weight:600;
    }

    .option-check{
      width:18px;height:18px;border-radius:50%;
      border:1.5px solid var(--faint);
      display:flex;align-items:center;justify-content:center;
      font-size:10px;flex-shrink:0;
      transition:all 0.15s;
    }

    .option-btn.selected .option-check{
      background:var(--teal);border-color:var(--teal);color:white;
    }

    /* ── INPUT AREA ── */
    .input-area{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:720px;
      padding:12px 16px 20px;
      background:rgba(240,247,246,0.96);
      backdrop-filter:blur(16px);
      border-top:1px solid var(--border);
      z-index:50;
    }

    .input-row{
      display:flex;gap:10px;align-items:flex-end;
    }

    .chat-input{
      flex:1;
      background:var(--surface);
      border:1.5px solid var(--border);
      border-radius:24px;
      padding:12px 20px;
      font-family:'DM Sans',sans-serif;
      font-size:14px;color:var(--text);
      outline:none;
      resize:none;
      min-height:44px;max-height:120px;
      line-height:1.5;
      transition:border-color 0.2s,box-shadow 0.2s;
    }

    .chat-input:focus{
      border-color:var(--teal);
      box-shadow:0 0 0 3px rgba(11,184,169,0.12);
    }

    .chat-input::placeholder{color:var(--faint)}

    .send-btn{
      width:44px;height:44px;
      background:var(--teal);
      border:none;border-radius:50%;
      color:white;font-size:18px;
      cursor:pointer;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      transition:background 0.2s,transform 0.15s;
      box-shadow:0 4px 12px rgba(11,184,169,0.35);
    }

    .send-btn:hover{background:var(--teal-dark);transform:scale(1.05)}
    .send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

    /* ── WELCOME SCREEN ── */
    .welcome-screen{
      position:fixed;inset:0;z-index:200;
      display:flex;align-items:center;justify-content:center;
      background:var(--bg);
      animation:fadeIn 0.4s ease;
    }

    .welcome-card{
      background:var(--surface);
      border-radius:28px;
      padding:48px 40px;
      max-width:440px;width:90%;
      text-align:center;
      box-shadow:var(--shadow-md);
      border:1px solid var(--border);
      animation:slideUp 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    .welcome-bear{
      font-size:72px;
      margin-bottom:16px;
      display:block;
      animation:bearBounce 0.8s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .welcome-title{
      font-family:'Nunito',sans-serif;
      font-size:28px;font-weight:900;
      color:var(--navy);margin-bottom:8px;
    }

    .welcome-sub{
      font-size:15px;color:var(--muted);
      line-height:1.65;margin-bottom:32px;
      font-weight:400;
    }

    .welcome-btn{
      background:var(--teal);color:white;
      border:none;border-radius:var(--radius);
      padding:14px 32px;
      font-family:'Nunito',sans-serif;
      font-size:16px;font-weight:800;
      cursor:pointer;width:100%;
      transition:all 0.2s;
      box-shadow:0 6px 20px rgba(11,184,169,0.35);
      margin-bottom:12px;
    }

    .welcome-btn:hover{background:var(--teal-dark);transform:translateY(-2px)}

    .welcome-skip{
      background:none;border:none;
      color:var(--muted);font-size:13px;cursor:pointer;
      text-decoration:underline;text-underline-offset:3px;
    }

    .welcome-skip:hover{color:var(--teal)}

    /* ── COMPLETION CARD ── */
    .completion-card{
      background:linear-gradient(135deg,var(--navy),var(--navy-light));
      border-radius:var(--radius);
      padding:28px;
      color:white;
      text-align:center;
      margin-left:58px;
      animation:msgIn 0.5s ease both;
    }

    .completion-card h3{
      font-family:'Nunito',sans-serif;
      font-size:20px;font-weight:900;
      margin-bottom:8px;
    }

    .completion-card p{font-size:14px;opacity:0.8;margin-bottom:20px;line-height:1.6}

    .btn-generate{
      background:var(--teal);color:white;
      border:none;border-radius:var(--radius-sm);
      padding:12px 24px;
      font-family:'Nunito',sans-serif;
      font-size:15px;font-weight:800;
      cursor:pointer;width:100%;
      transition:all 0.2s;
      box-shadow:0 4px 16px rgba(11,184,169,0.4);
      margin-bottom:8px;
    }

    .btn-generate:hover{background:var(--teal-dark);transform:translateY(-1px)}
    .btn-generate:disabled{opacity:0.5;cursor:not-allowed;transform:none}

    .btn-secondary-sm{
      background:rgba(255,255,255,0.1);color:white;
      border:1px solid rgba(255,255,255,0.2);
      border-radius:var(--radius-sm);padding:10px 20px;
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
      cursor:pointer;width:100%;transition:all 0.2s;
    }

    .btn-secondary-sm:hover{background:rgba(255,255,255,0.15)}

    /* ── CONFIDENCE BADGE ── */
    .confidence-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--green-light);border:1px solid rgba(16,185,129,0.3);
      border-radius:20px;padding:4px 12px;
      font-size:12px;font-weight:700;color:var(--green);
      margin-bottom:12px;
    }

    /* ── SCROLL ANCHOR ── */
    #scroll-anchor{height:1px}

    /* ── ANIMATIONS ── */
    @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bearBounce{0%{opacity:0;transform:scale(0.5) translateY(20px)}60%{transform:scale(1.15) translateY(-8px)}100%{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes typeBounce{0%,80%,100%{transform:scale(0.4);opacity:0.4}40%{transform:scale(1);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── RESPONSIVE ── */
    @media(max-width:500px){
      .welcome-card{padding:36px 24px}
      .welcome-bear{font-size:56px}
      .bear-bubble{font-size:14px}
    }
  </style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-dots"></div>

<!-- Welcome screen -->
<div class="welcome-screen" id="welcome-screen">
  <div class="welcome-card">
    <span class="welcome-bear">🐻</span>
    <h1 class="welcome-title">Hi! I'm Barita!</h1>
    <p class="welcome-sub">
      Your friendly investment advisor bear 🎉<br/>
      I'll guide you through building your <strong>personalised portfolio</strong> — one fun question at a time. No jargon, I promise! 🍯
    </p>
    <button class="welcome-btn" id="btn-start">
      Let's get started! →
    </button>
    <button class="welcome-skip" id="btn-skip">
      Skip to questionnaire form instead
    </button>
  </div>
</div>

<!-- Main chat interface -->
<div class="chat-wrap">
  <div class="topbar">
    <div class="topbar-brand">
      <span class="topbar-bear">🐻</span>
      <div class="topbar-name">
        Barita
        <span>Wealth Advisor</span>
      </div>
    </div>
    <div class="progress-pill">
      <div class="progress-bar-mini">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <span id="progress-text">0%</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div id="scroll-anchor"></div>
</div>

<!-- Input area -->
<div class="input-area">
  <div class="input-row">
    <textarea
      class="chat-input"
      id="chat-input"
      placeholder="Type your answer or pick an option above…"
      rows="1"
    ></textarea>
    <button class="send-btn" id="send-btn" disabled>→</button>
  </div>
</div>

<script type="module">
  // ── Firebase imports ──────────────────────────────────────────────────────
  import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCYCE51wwDyxJ93Md7-SB3Vu0MouAkmupE",
    authDomain:        "barita-soc-team-c.firebaseapp.com",
    projectId:         "barita-soc-team-c",
    storageBucket:     "barita-soc-team-c.firebasestorage.app",
    messagingSenderId: "363840368061",
    appId:             "1:363840368061:web:d9c69645015d196e3236d4",
  };

  const BACKEND_URL = "http://localhost:5000";

  const fbApp  = initializeApp(FIREBASE_CONFIG);
  const auth   = getAuth(fbApp);

  // ── State ─────────────────────────────────────────────────────────────────
  let firebaseToken = null;
  let answers       = {};
  let chatHistory   = [];
  let stage         = "intro";
  let totalFields   = 15;
  let filledFields  = 0;
  let isThinking    = false;
  let currentOptions= null;  // options being displayed

  const FIELD_ORDER = [
    "first_name","last_name","age","knowledge_level","primary_goal",
    "withdrawal_time","drop_reaction","max_loss","income_loss_runway",
    "debt_situation","earn_currency","spend_currency","inflation_impact",
    "invest_style","risk_relationship"
  ];

  // ── Auth ──────────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, async user => {
    if (user) {
      firebaseToken = await user.getIdToken();
      setInterval(async () => { firebaseToken = await user.getIdToken(true); }, 50*60*1000);
    } else {
      window.location.href = "/app";
    }
  });

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const messagesEl  = document.getElementById("messages");
  const inputEl     = document.getElementById("chat-input");
  const sendBtn     = document.getElementById("send-btn");
  const progressFill= document.getElementById("progress-fill");
  const progressText= document.getElementById("progress-text");
  const welcomeEl   = document.getElementById("welcome-screen");

  // ── Welcome screen ────────────────────────────────────────────────────────
  document.getElementById("btn-start").addEventListener("click", () => {
    welcomeEl.style.opacity = "0";
    welcomeEl.style.transition = "opacity 0.4s";
    setTimeout(() => welcomeEl.style.display = "none", 400);
    startChat();
  });

  document.getElementById("btn-skip").addEventListener("click", () => {
    window.location.href = "/app";
  });

  // ── Chat logic ────────────────────────────────────────────────────────────
  async function startChat() {
    await bearTyping();
    const opening = await callChatQuestionnaire("", [], {}, "intro");
    if (opening) {
      removeTying();
      addBearMessage(opening.message, opening.options);
      stage = opening.stage || "questionnaire";
    }
    enableInput();
  }

  async function sendMessage(text) {
    if (!text.trim() || isThinking) return;
    disableInput();
    clearOptions();

    addUserMessage(text);
    chatHistory.push({ role: "user", text });

    // Update answers if we extracted one from options
    if (currentOptions) currentOptions = null;

    await bearTyping();

    try {
      const result = await callChatQuestionnaire(text, chatHistory, answers, stage);
      removeTying();

      if (!result) {
        addBearMessage("Sorry, I had a little hiccup! 🐻 Could you try that again?", null);
        enableInput();
        return;
      }

      // Merge extracted answers
      if (result.extracted_answer && typeof result.extracted_answer === "object") {
        Object.assign(answers, result.extracted_answer);
        updateProgress();
      }

      stage = result.stage || stage;
      chatHistory.push({ role: "bear", text: result.message });

      // Show bear message
      addBearMessage(result.message, result.options || null);

      // If complete, show completion card
      if (stage === "complete") {
        setTimeout(() => addCompletionCard(), 800);
        return;
      }

      enableInput();
    } catch(e) {
      removeTying();
      addBearMessage(`Oops! Something went wrong 🐾 (${e.message}). Let's try again!`, null);
      enableInput();
    }
  }

  async function callChatQuestionnaire(message, history, currentAnswers, currentStage) {
    const resp = await fetch(`${BACKEND_URL}/chat_questionnaire`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${firebaseToken}`,
      },
      body: JSON.stringify({
        message,
        history: history.slice(-12),
        answers: currentAnswers,
        stage: currentStage,
      }),
    });

    if (!resp.ok) throw new Error(`Backend error ${resp.status}`);
    const data = await resp.json();
    return data.parsed || null;
  }

  // ── Message rendering ─────────────────────────────────────────────────────
  function addBearMessage(text, options) {
    const row = document.createElement("div");
    row.className = "msg-bear";
    row.innerHTML = `
      <div class="bear-avatar">🐻</div>
      <div class="bear-bubble">${formatBearText(text)}</div>
    `;
    messagesEl.appendChild(row);

    // Render option buttons if provided
    if (options && options.length > 0) {
      currentOptions = options;
      const tray = document.createElement("div");
      tray.className = "options-tray";
      tray.id = "options-tray";
      options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<span class="option-check"></span>${opt}`;
        btn.addEventListener("click", () => {
          // Mark selected
          tray.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          btn.querySelector(".option-check").textContent = "✓";
          // Auto-send after brief delay
          setTimeout(() => {
            tray.remove();
            sendMessage(opt);
          }, 300);
        });
        tray.appendChild(btn);
      });
      messagesEl.appendChild(tray);
    }

    scrollBottom();
  }

  function addUserMessage(text) {
    const row = document.createElement("div");
    row.className = "msg-user";
    row.innerHTML = `<div class="user-bubble">${esc(text)}</div>`;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function addCompletionCard() {
    const card = document.createElement("div");
    card.className = "completion-card";
    card.innerHTML = `
      <div style="font-size:48px;margin-bottom:12px">🎉</div>
      <h3>Pawsome! All done! 🐻</h3>
      <p>I've got everything I need to build your personalised portfolio. Ready to see what I've put together for you?</p>
      <div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;text-align:left">
        ${Object.entries(answers).filter(([k]) => FIELD_ORDER.includes(k)).map(([k,v]) =>
          `<div style="margin-bottom:4px"><strong>${formatFieldName(k)}:</strong> ${Array.isArray(v)?v.join(', '):v}</div>`
        ).join('')}
      </div>
      <button class="btn-generate" id="btn-generate">🚀 Build My Portfolio!</button>
      <button class="btn-secondary-sm" id="btn-retake">← Change an answer</button>
    `;

    const wrapper = document.createElement("div");
    wrapper.style.marginLeft = "58px";
    wrapper.appendChild(card);
    messagesEl.appendChild(wrapper);
    scrollBottom();

    document.getElementById("btn-generate").addEventListener("click", generatePortfolio);
    document.getElementById("btn-retake").addEventListener("click", () => {
      card.innerHTML = `<p style="color:white;font-size:14px">Just type your correction naturally and I'll update it! 🐾</p>`;
      stage = "questionnaire";
      enableInput();
    });
  }

  // ── Portfolio generation ──────────────────────────────────────────────────
  async function generatePortfolio() {
    const btn = document.getElementById("btn-generate");
    if (btn) { btn.disabled=true; btn.textContent="Building... 🐾"; }

    // Show loading message
    addBearMessage("Bear with me while I crunch the numbers! 🐻📊 This usually takes about 10-15 seconds…", null);

    try {
      const resp = await fetch(`${BACKEND_URL}/analyse`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${firebaseToken}`,
        },
        body: JSON.stringify({ answers }),
      });

      if (!resp.ok) throw new Error(`Analysis failed: ${resp.status}`);
      const data = await resp.json();

      // Store in sessionStorage for the dashboard
      sessionStorage.setItem("barita_report", JSON.stringify(data));
      sessionStorage.setItem("barita_answers", JSON.stringify(answers));

      // Show success message
      addBearMessage(
        `🎉 Your portfolio is ready, ${answers.first_name || "friend"}! ` +
        `You've been classified as a <strong>${data.behavioral_profile || data.profile}</strong> investor ` +
        `with a confidence score of <strong>${data.confidence?.score || '—'}/100</strong>. ` +
        `Let's go see your results! 🍯`,
        null
      );

      setTimeout(() => { window.location.href = "/app"; }, 2000);

    } catch(e) {
      addBearMessage(`Oh no! Something went wrong building your portfolio 😟 (${e.message}). Let me try again!`, null);
      if (btn) { btn.disabled=false; btn.textContent="🚀 Try Again"; }
    }
  }

  // ── Typing indicator ──────────────────────────────────────────────────────
  function bearTyping() {
    isThinking = true;
    const row = document.createElement("div");
    row.className = "msg-bear";
    row.id = "typing-row";
    row.innerHTML = `
      <div class="bear-avatar">🐻</div>
      <div class="bear-bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
    return new Promise(resolve => setTimeout(resolve, 600 + Math.random()*400));
  }

  function removeTying() {
    const row = document.getElementById("typing-row");
    if (row) row.remove();
    isThinking = false;
  }

  function clearOptions() {
    const tray = document.getElementById("options-tray");
    if (tray) tray.remove();
  }

  // ── Input handling ────────────────────────────────────────────────────────
  function enableInput()  { sendBtn.disabled=false; inputEl.disabled=false; inputEl.focus(); }
  function disableInput() { sendBtn.disabled=true;  inputEl.disabled=true; }

  inputEl.addEventListener("input", () => {
    sendBtn.disabled = !inputEl.value.trim();
    // Auto-resize
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (text) {
        inputEl.value = "";
        inputEl.style.height = "auto";
        sendBtn.disabled = true;
        sendMessage(text);
      }
    }
  });

  sendBtn.addEventListener("click", () => {
    const text = inputEl.value.trim();
    if (text) {
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;
      sendMessage(text);
    }
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function scrollBottom() {
    setTimeout(() => {
      document.getElementById("scroll-anchor").scrollIntoView({ behavior: "smooth", block: "end" });
    }, 50);
  }

  function esc(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatBearText(text) {
    // Bold **text** and preserve line breaks
    return esc(text)
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br/>");
  }

  function formatFieldName(k) {
    const names = {
      first_name:"First Name",last_name:"Last Name",age:"Age",
      knowledge_level:"Experience",primary_goal:"Goal",
      withdrawal_time:"Withdrawals",drop_reaction:"Drop Reaction",
      max_loss:"Max Loss",income_loss_runway:"Income Runway",
      debt_situation:"Debt",earn_currency:"Earn (CCY)",
      spend_currency:"Spend (CCY)",inflation_impact:"Inflation",
      invest_style:"Style",risk_relationship:"Risk Mindset",
    };
    return names[k] || k;
  }

  function updateProgress() {
    filledFields = FIELD_ORDER.filter(f => answers[f]).length;
    const pct    = Math.round((filledFields / totalFields) * 100);
    progressFill.style.width = pct + "%";
    progressText.textContent = pct + "%";
  }
</script>

</body>
</html>
